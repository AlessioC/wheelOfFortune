<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubrica — Dipartimento della Famiglia</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.17);
  --text:#1a1a18;--text2:#5c5b57;--text3:#9b9991;
  --accent:#1a5c9e;--accent-bg:#e8f0f9;--accent-text:#0c3d6e;
  --r:10px;--shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04)
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.logo{width:40px;height:40px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:20px;height:20px;fill:#fff}
.hdr-title h1{font-size:16px;font-weight:600;letter-spacing:-.2px}
.hdr-title p{font-size:11px;color:var(--text3);margin-top:1px}
.pill{margin-left:auto;background:var(--accent-bg);color:var(--accent-text);font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;white-space:nowrap}
.sw{position:relative}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.si svg{width:16px;height:16px;display:block}
#search{width:100%;padding:10px 38px;border:1.5px solid var(--border2);border-radius:8px;font-size:15px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .15s,background .15s}
#search:focus{border-color:var(--accent);background:var(--surface)}
#search::placeholder{color:var(--text3)}
.cb{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:50%;display:none;align-items:center;justify-content:center}
.cb svg{width:14px;height:14px;display:block}

/* barra filtri servizio */
.filters{display:flex;gap:3px;padding:10px 0 0;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fb{background:none;border:1px solid transparent;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s}
.fb:hover{background:var(--surface2);border-color:var(--border2)}
.fb.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* barra ordinamento */
.sort-bar{display:flex;align-items:center;gap:3px;padding:6px 0 10px;overflow-x:auto;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-label{font-size:11px;color:var(--text3);white-space:nowrap;padding:0 6px 0 2px;flex-shrink:0}
.sb{background:none;border:1px solid transparent;border-radius:20px;padding:3px 10px;font-size:11.5px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s;display:inline-flex;align-items:center;gap:4px}
.sb:hover{background:var(--surface2);border-color:var(--border2)}
.sb.active{background:var(--surface);border-color:var(--border2);color:var(--text);font-weight:600}
.sb .arr{font-size:10px;opacity:.7}
/* separatore tra sort buttons */
.sort-sep{width:1px;height:14px;background:var(--border2);flex-shrink:0;margin:0 2px}

.main{max-width:920px;margin:0 auto;padding:14px 14px 40px}
.ib{font-size:12px;color:var(--text3);margin-bottom:10px;padding:0 2px;min-height:17px}
.list{display:flex;flex-direction:column;gap:7px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;transition:border-color .12s,box-shadow .12s}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;letter-spacing:.3px}
.cb2{min-width:0}
.cn{font-size:14px;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:11.5px;color:var(--text3);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tags{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tag{font-size:10.5px;font-weight:500;padding:2px 7px;border-radius:20px}
.tq{background:var(--accent-bg);color:var(--accent-text)}
.td{background:#eeedfe;color:#3c3489}
.ts{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.ea{display:inline-block;font-size:11px;color:var(--accent);text-decoration:none;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.ea:hover{text-decoration:underline}
.note-inline{font-size:11px;color:#92400e;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;display:flex;align-items:baseline;gap:4px}
.note-inline::before{content:'✎';font-size:10px;flex-shrink:0}
.cr{text-align:right;flex-shrink:0;min-width:72px}
.in{font-size:21px;font-weight:700;color:var(--accent);letter-spacing:-.5px;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums}
.il{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.nd{font-size:11px;color:var(--text3);font-style:italic}
.loc{font-size:10.5px;color:var(--text3);margin-top:2px}
mark{background:#ffe566;color:inherit;border-radius:2px;padding:0 1px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty svg{width:44px;height:44px;margin-bottom:12px;opacity:.35;display:block;margin-left:auto;margin-right:auto}
.empty h3{font-size:15px;color:var(--text2);margin-bottom:5px}
@media(max-width:560px){
  .card{grid-template-columns:38px 1fr}
  .cr{display:none}
  .ea{max-width:180px}
}
</style>
</head>

</div>

<script>
const C=JSON.parse(document.getElementById("rubrica-data").textContent);
const AV=[
  {bg:'#dbeafe',t:'#1e3a8a'},{bg:'#dcfce7',t:'#14532d'},{bg:'#ede9fe',t:'#3b0764'},
  {bg:'#fef9c3',t:'#713f12'},{bg:'#fce7f3',t:'#831843'},{bg:'#ffedd5',t:'#7c2d12'},
  {bg:'#d1fae5',t:'#064e3b'},{bg:'#e0e7ff',t:'#312e81'},{bg:'#fef2f2',t:'#7f1d1d'},
];
const SO=['dir','A','S1','S2','S3','S4','S5','S6','S7','S8','S9','S10'];
const SL={dir:'Direzione',A:'Area',S1:'S.1',S2:'S.2',S3:'S.3',S4:'S.4',S5:'S.5',S6:'S.6',S7:'S.7',S8:'S.8',S9:'S.9',S10:'S.10'};
const IS_DIR=['DIRIGENTE GENERALE','DIRIGENTE','DIRIGENTE (f.f.)'];

// ─── GERARCHIA QUALIFICHE ────────────────────────────────────────
// Ordine gerarchico decrescente: 0 = massimo grado
const QUAL_RANK={
  'DIRIGENTE GENERALE':0,
  'DIRIGENTE':1,
  'DIRIGENTE (f.f.)':2,
  'FUNZIONARIO':3,
  'ASSISTENTE':4,
  'ASSISTENTE n.v.':5,
  'COADIUTORE':6
};
function qualRank(q){ return QUAL_RANK[q]??99; }

// ─── STATO ───────────────────────────────────────────────────────
let af='all', sv='';

// sort: { key, dir }
// key: 'cognome' | 'qualifica' | 'piano' | 'servizio'
// dir: 'asc' | 'desc'
// Per qualifica: asc = dal più alto in gerarchia; per piano: asc = piano più basso
let sort={ key:'cognome', dir:'asc' };

// ─── SORT CONFIGS ────────────────────────────────────────────────
// Definizione dei pulsanti di sort disponibili per contesto
// 'always': visibile sempre; 'all-only': solo quando filtro=Tutti
const SORT_DEFS=[
  { key:'cognome',  label:'A→Z',       labelDesc:'Z→A',       always:true,     title:'Ordina per cognome'},
  { key:'qualifica',label:'Qualifica ↑',labelDesc:'Qualifica ↓',always:true,    title:'Ordina per gerarchia (Dirigente → Coadiutore / viceversa)'},
  { key:'piano',    label:'Piano ↑',    labelDesc:'Piano ↓',   always:true,     title:'Ordina per piano (crescente / decrescente)'},
  { key:'servizio', label:'Servizio',   labelDesc:'Servizio',  always:false,    title:'Ordina per servizio (solo vista Tutti)'},
];

// ─── FILTRI SERVIZIO ─────────────────────────────────────────────
const fb=document.getElementById('fbar');
function mkFBtn(f,label,title){
  const b=document.createElement('button');
  b.className='fb'+(f==='all'?' active':'');
  b.textContent=label; b.dataset.f=f;
  if(title) b.title=title;
  fb.appendChild(b);
}
mkFBtn('all','Tutti');
SO.forEach(code=>{
  if(!C.some(c=>c.servizio_codice===code))return;
  const sample=C.find(c=>c.servizio_codice===code);
  mkFBtn(code,SL[code]||code,sample?.servizio||'');
});
fb.addEventListener('click',e=>{
  const b=e.target.closest('.fb');if(!b)return;
  af=b.dataset.f;
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  // se il sort corrente è 'servizio' e si passa a un filtro specifico, torna a cognome
  if(sort.key==='servizio'&&af!=='all'){ sort={key:'cognome',dir:'asc'}; }
  buildSortBar();
  render();
});

// ─── BARRA ORDINAMENTO ───────────────────────────────────────────
const sbar=document.getElementById('sbar');

function buildSortBar(){
  sbar.innerHTML='';
  const lbl=document.createElement('span');
  lbl.className='sort-label';
  lbl.textContent='Ordina:';
  sbar.appendChild(lbl);

  SORT_DEFS.forEach((def,i)=>{
    // 'servizio' visibile solo con filtro Tutti
    if(!def.always && af!=='all') return;

    // separatore prima del gruppo "servizio" (solo se presente)
    if(!def.always && af==='all'){
      const sep=document.createElement('div');
      sep.className='sort-sep';
      sbar.appendChild(sep);
    }

    const isActive=sort.key===def.key;
    const isDesc=isActive&&sort.dir==='desc';
    const b=document.createElement('button');
    b.className='sb'+(isActive?' active':'');
    b.title=def.title;
    b.dataset.k=def.key;
    b.innerHTML=isActive
      ? (isDesc ? def.labelDesc : def.label)+' <span class="arr">'+(isDesc?'▼':'▲')+'</span>'
      : def.label;
    sbar.appendChild(b);
  });

  sbar.addEventListener('click',e=>{
    const b=e.target.closest('.sb');if(!b)return;
    const k=b.dataset.k;
    if(sort.key===k){
      sort.dir=sort.dir==='asc'?'desc':'asc';
    } else {
      // default dir per ogni chiave
      sort={ key:k, dir:'asc' };
    }
    buildSortBar();
    render();
  });
}

// ─── FUNZIONE DI SORT ────────────────────────────────────────────
function sortContacts(arr){
  const mult=sort.dir==='asc'?1:-1;
  return [...arr].sort((a,b)=>{
    switch(sort.key){
      case 'cognome':
        return mult*(a.cognome.localeCompare(b.cognome,'it')||a.nome.localeCompare(b.nome,'it'));
      case 'qualifica':{
        const diff=qualRank(a.qualifica)-qualRank(b.qualifica);
        // a parità di qualifica, secondario per cognome sempre asc
        return mult*diff || a.cognome.localeCompare(b.cognome,'it');
      }
      case 'piano':{
        const pa=parseInt(a.piano)||0, pb=parseInt(b.piano)||0;
        return mult*(pa-pb) || a.cognome.localeCompare(b.cognome,'it');
      }
      case 'servizio':{
        // ordine canonico dei servizi (SO), poi cognome
        const sa=SO.indexOf(a.servizio_codice), sb2=SO.indexOf(b.servizio_codice);
        const si=(sa===-1?99:sa)-(sb2===-1?99:sb2);
        return mult*si || a.cognome.localeCompare(b.cognome,'it');
      }
      default:
        return 0;
    }
  });
}

// ─── RICERCA ─────────────────────────────────────────────────────
const se=document.getElementById('search'),cbtn=document.getElementById('cb');
se.addEventListener('input',()=>{sv=se.value.trim();cbtn.style.display=sv?'flex':'none';render();});
cbtn.addEventListener('click',()=>{se.value='';sv='';cbtn.style.display='none';se.focus();render();});

function hl(t,q){
  if(!q)return String(t);
  return String(t).replace(new RegExp(q.replace(/[-[\]{}()*+?.,\\^$|#\s]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
}

// ─── RENDER ──────────────────────────────────────────────────────
function render(){
  const q=sv.toLowerCase();
  let f=C.filter(c=>{
    if(af!=='all'&&c.servizio_codice!==af)return false;
    if(!q)return true;
    return (c.interno&&c.interno.includes(q))||
           c.cognome.toLowerCase().includes(q)||
           c.nome.toLowerCase().includes(q)||
           (c.email&&c.email.toLowerCase().includes(q))||
           (c.servizio&&c.servizio.toLowerCase().includes(q));
  });

  f=sortContacts(f);

  document.getElementById('ib').textContent=
    f.length===C.length?`${C.length} contatti`:`${f.length} risultat${f.length===1?'o':'i'} su ${C.length}`;
  document.getElementById('pill').textContent=f.length+' contatti';
  const list=document.getElementById('list');
  if(!f.length){
    list.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg><h3>Nessun risultato</h3><p>Nessun contatto per "${sv}"</p></div>`;
    return;
  }
  list.innerHTML=f.map((c,i)=>{
    // colore avatar basato sull'indice originale per coerenza visiva
    const origIdx=C.indexOf(c);
    const av=AV[origIdx%AV.length];
    const ini=((c.cognome[0]||'')+(c.nome[0]||'')).toUpperCase();
    const isDir=IS_DIR.includes(c.qualifica);
    const pianoNum=parseInt(c.piano);
    const loc=[(!isNaN(pianoNum)&&pianoNum>=0)?`Piano ${c.piano}`:'',c.stanza?`St. ${c.stanza}`:''].filter(Boolean).join(' · ');
    return `<div class="card">
      <div class="av" style="background:${av.bg};color:${av.t}">${ini}</div>
      <div class="cb2">
        <div class="cn">${hl(c.cognome,sv)} ${hl(c.nome,sv)}</div>
        <div class="cm">${c.servizio||'—'}</div>
        <div class="tags">
          <span class="tag ${isDir?'td':'tq'}">${c.qualifica}</span>
        </div>
        ${c.email?`<a href="mailto:${c.email}" class="ea">${hl(c.email,sv)}</a>`:''}
        ${c.note&&c.note.trim()?`<div class="note-inline" title="${c.note.trim().replace(/"/g,'&quot;')}">${hl(c.note.trim(),sv)}</div>`:''}
      </div>
      <div class="cr">
        ${c.interno
          ?`<div class="in">${hl(c.interno,sv)}</div><div class="il">interno</div>`
          :`<div class="nd">n/d</div>`}
        ${loc?`<div class="loc">${loc}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ─── AVVIO ───────────────────────────────────────────────────────
buildSortBar();
render();
</script>
